# Project name avoids invalid image refs when the parent folder has odd characters.
name: popsight

services:
  backend:
    image: popsight-backend:latest
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: "development"
      APP_URL: "http://localhost:8000"
      POPSIGHT_DATABASE_URL: "postgresql://popsight:popsight@postgres:5432/popsight"
      POPSIGHT_AUTO_BOOTSTRAP_MACROS: "true"
      POPSIGHT_QDRANT_URL: "http://qdrant:6333"
      # Pass through from your local `.env` (docker compose auto-loads it).
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY}"
      SERPAPI_API_KEY: "${SERPAPI_API_KEY}"
      POPSIGHT_GLINER_ENABLED: "${POPSIGHT_GLINER_ENABLED:-true}"
      POPSIGHT_GLINER_MODEL_ID: "${POPSIGHT_GLINER_MODEL_ID:-urchade/gliner_small-v2.1}"
      POPSIGHT_GLINER_THRESHOLD: "${POPSIGHT_GLINER_THRESHOLD:-0.35}"
      POPSIGHT_GLINER_MAX_INPUT_CHARS: "${POPSIGHT_GLINER_MAX_INPUT_CHARS:-1500}"
      POPSIGHT_GLINER_BATCH_SIZE: "${POPSIGHT_GLINER_BATCH_SIZE:-8}"
      POPSIGHT_GLINER_CONSOLE_SAMPLES: "${POPSIGHT_GLINER_CONSOLE_SAMPLES:-3}"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  frontend:
    image: node:22-bookworm-slim
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      # Vite proxy target from inside the container (see vite.config.ts).
      APP_URL: "http://backend:8000"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "npm install && npm run dev:docker"
    depends_on:
      - backend

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: popsight
      POSTGRES_USER: popsight
      POSTGRES_PASSWORD: popsight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U popsight -d popsight"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
  frontend_node_modules:

