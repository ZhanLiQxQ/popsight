# Project name avoids invalid image refs when the parent folder has odd characters.
name: popsight

services:
  backend:
    image: popsight-backend:latest
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: "development"
      APP_URL: "http://localhost:8000"
      POPSIGHT_DATABASE_URL: "postgresql://popsight:popsight@postgres:5432/popsight"
      POPSIGHT_AUTO_BOOTSTRAP_MACROS: "true"
      POPSIGHT_QDRANT_URL: "http://qdrant:6333"
      # Pass through from your local `.env` (docker compose auto-loads it).
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY}"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: popsight
      POSTGRES_USER: popsight
      POSTGRES_PASSWORD: popsight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U popsight -d popsight"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:

